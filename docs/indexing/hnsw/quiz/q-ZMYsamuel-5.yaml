author: ZMYsamuel
date: 2026-04-24
question: |
  你在實作 HNSW 插入流程時發現一個差異：
  當某節點鄰居數超過上限 `M`，你的程式會刪掉「最近的鄰居」，
  而不是常見做法的「刪掉最遠的鄰居」。

  若其餘流程不變，這個改動最可能造成什麼影響？
options:
  - text: "通常會傷害底層局部導航品質，因為短距離連線被優先移除，查詢更容易在局部區域找不到精細路徑。"
    correct: true
    explanation: |
      HNSW 需要短距離連線支撐局部精確搜尋，也需要長距離連線做跨區跳轉。
      把最近鄰邊優先刪掉，會削弱 local refinement 的能力，常見結果是 recall 下降。
  - text: "通常會顯著提升 recall，因為保留較遠的邊可以完全取代短距離連線。"
    explanation: |
      長距離邊有助快速到達大致區域，但無法完全替代局部細化所需的短邊。
      只保留遠邊常讓最後一段搜尋不夠精準。
  - text: "幾乎沒有影響，因為 `efSearch` 會自動修復圖結構錯誤。"
    explanation: |
      `efSearch` 只能增加查詢期探索寬度，不能修復建圖時被刪除的關鍵連線。
      若圖的局部結構被破壞，增大 beam width 也常只能部分補救。
  - text: "只會影響建構時間，不會影響 recall 或 latency。"
    explanation: |
      鄰居修剪策略會直接改變最終圖拓樸，進而影響查詢路徑。
      因此不只建構期，線上 recall 與延遲分布也可能被影響。
